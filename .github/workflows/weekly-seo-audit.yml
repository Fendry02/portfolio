name: Weekly SEO Audit

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: weekly-seo-audit
  cancel-in-progress: true

jobs:
  seo-audit:
    name: Audit production SEO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SEO audit
        run: npm run seo:audit
        env:
          SEO_AUDIT_BASE_URL: https://bbenoit.fr
          SEO_SITE_URL: https://bbenoit.fr
